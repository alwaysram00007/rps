<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPS GAME</title>
    <link rel="stylesheet" href="rps.css">
</head>
<body>
    <main>
        <p class="welcome">----- WELCOME TO RPS GAME -----</p>
        <p class="rps-heading">Rock Paper Scissors</p>
        <button class="three-btns js-rock-btn" title="Click R"><img src="IMAGES/rock-emoji.png" class="images"></button>
        <button class="three-btns js-paper-btn" title="Click P"><img src="IMAGES/paper-emoji.png" class="images"></button>
        <button class="three-btns js-scissors-btn" title="Click S"><img src="IMAGES/scissors-emoji.png" class="images"></button>
        <p class="moves-para"></p>
        <p class="result-para"></p>
        <p class="score-para"></p>
        <button class="reset-btn js-reset-btn" title="Press Backspace">Reset Score</button>
        <button class="reset-btn js-autoPlay-btn" title="Click A">Auto Play</button>
        <p class="js-reset-para"></p>
        <p class="note">( NOTE: You can also play this game using keyboard. )</p>
    </main>

    <script src="rps.js"></script>
</body>
</html>
